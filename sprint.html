<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Interview Prep — Python</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #21262d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --warn: #f85149;
    --muted: #8b949e;
    --text: #e6edf3;
    --text-dim: #c9d1d9;
    --hard: #ff7b72;
    --tag-bg: #1f2937;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 960px; margin: 0 auto; }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  header p {
    color: var(--muted);
    margin-top: 0.4rem;
    font-size: 0.9rem;
  }

  /* Progress bar */
  .progress-bar-wrap {
    margin: 1.5rem auto 0;
    max-width: 400px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'JetBrains Mono', monospace;
  }

  .progress-bar {
    height: 8px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Topic sections */
  .topic {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 1.2rem;
    overflow: hidden;
  }

  .topic-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.2rem;
    cursor: pointer;
    user-select: none;
    gap: 1rem;
  }

  .topic-header:hover { background: rgba(88,166,255,0.04); }

  .topic-title {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    font-weight: 600;
    font-size: 1rem;
  }

  .topic-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    background: rgba(88,166,255,0.1);
    border: 1px solid rgba(88,166,255,0.2);
    border-radius: 5px;
    padding: 2px 7px;
    min-width: 30px;
    text-align: center;
  }

  .topic-meta {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .topic-progress-text {
    font-size: 0.78rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
  }

  .topic-mini-bar {
    width: 80px;
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .topic-mini-fill {
    height: 100%;
    background: var(--accent2);
    border-radius: 99px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .chevron {
    color: var(--muted);
    font-size: 0.8rem;
    transition: transform 0.2s;
  }

  .topic.open .chevron { transform: rotate(180deg); }

  /* overview link */
  .overview-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
    color: var(--accent);
    text-decoration: none;
    padding: 0 1.2rem 0.8rem;
    opacity: 0.85;
  }
  .overview-link:hover { opacity: 1; text-decoration: underline; }

  /* Table */
  .problem-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }

  .problem-table th {
    text-align: left;
    padding: 0.5rem 1rem;
    font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    background: rgba(0,0,0,0.2);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .problem-table td {
    padding: 0.65rem 1rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .problem-table tr:last-child td { border-bottom: none; }

  .problem-table tr:hover td { background: rgba(88,166,255,0.03); }

  /* Checkbox */
  .check {
    appearance: none;
    width: 17px;
    height: 17px;
    border: 2px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    background: transparent;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .check:checked {
    background: var(--accent2);
    border-color: var(--accent2);
  }
  .check:checked::after {
    content: '✓';
    position: absolute;
    top: -2px;
    left: 2px;
    font-size: 12px;
    color: #0d1117;
    font-weight: 700;
  }
  .check:hover { border-color: var(--accent); }

  /* Row done state */
  tr.done td { opacity: 0.45; }
  tr.done .problem-link { text-decoration: line-through; }

  /* Links */
  .problem-link {
    color: var(--text-dim);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.15s;
  }
  .problem-link:hover { color: var(--accent); }

  .video-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    color: var(--accent);
    text-decoration: none;
    font-size: 0.82rem;
    font-family: 'JetBrains Mono', monospace;
    padding: 3px 9px;
    border: 1px solid rgba(88,166,255,0.25);
    border-radius: 5px;
    background: rgba(88,166,255,0.07);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .video-link:hover {
    background: rgba(88,166,255,0.15);
    border-color: var(--accent);
  }

  .pattern-tag {
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--tag-bg);
    border-radius: 4px;
    padding: 2px 7px;
    white-space: nowrap;
  }

  .hard-badge {
    font-size: 0.68rem;
    font-family: 'JetBrains Mono', monospace;
    color: var(--hard);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 4px;
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* Topic body collapse */
  .topic-body { display: none; }
  .topic.open .topic-body { display: block; }

  /* Resources */
  .resources {
    margin-top: 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 1.4rem;
  }
  .resources h2 {
    font-size: 0.85rem;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 0.8rem;
  }
  .resources a {
    display: block;
    color: var(--accent);
    text-decoration: none;
    font-size: 0.88rem;
    padding: 0.3rem 0;
  }
  .resources a:hover { text-decoration: underline; }

  /* Reset button */
  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.78rem;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--warn); color: var(--warn); }

  .header-actions {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-top: 1rem;
  }
</style>
</head>

      { name: "Implement Trie (Prefix Tree)", url: "https://leetcode.com/problems/implement-trie-prefix-tree/", pattern: "Trie", video: "https://youtu.be/oobqoCJlHA0" },
      { name: "Contacts", url: "https://www.hackerrank.com/challenges/contacts/problem", pattern: "Trie", video: "https://youtu.be/vlYZb68kAY0" },
      { name: "Word Search II", url: "https://leetcode.com/problems/word-search-ii/", pattern: "Trie + DFS", video: "https://youtu.be/asbcE9mZz_U", hard: true },
      { name: "No Prefix Set", url: "https://www.hackerrank.com/challenges/no-prefix-set/problem", pattern: "Trie", video: "https://youtu.be/vlYZb68kAY0" },
    ]
  }
];

const TOTAL = DATA.reduce((s, t) => s + t.problems.length, 0);
let checked = JSON.parse(localStorage.getItem('dsa-checked') || '{}');

function save() { localStorage.setItem('dsa-checked', JSON.stringify(checked)); }

function getKey(topicId, pi) { return `${topicId}-${pi}`; }

function countDone(topic) {
  return topic.problems.filter((_, i) => checked[getKey(topic.id, i)]).length;
}

function updateOverall() {
  const done = Object.values(checked).filter(Boolean).length;
  document.getElementById('overall-count').textContent = `${done} / ${TOTAL}`;
  document.getElementById('overall-fill').style.width = `${(done / TOTAL) * 100}%`;
}

function updateTopicBar(topic) {
  const done = countDone(topic);
  const total = topic.problems.length;
  const pct = (done / total) * 100;
  const fill = document.getElementById(`mini-fill-${topic.id}`);
  const txt = document.getElementById(`mini-txt-${topic.id}`);
  if (fill) fill.style.width = `${pct}%`;
  if (txt) txt.textContent = `${done}/${total}`;
}

function render() {
  const container = document.getElementById('topics');
  container.innerHTML = '';
  DATA.forEach(topic => {
    const div = document.createElement('div');
    div.className = 'topic open';
    div.id = `topic-${topic.id}`;

    const overviewLinks = `<a class="overview-link" href="${topic.overview}" target="_blank" rel="noopener">▶ Topic Overview (NeetCode)</a>`
      + (topic.overview2 ? ` <a class="overview-link" href="${topic.overview2}" target="_blank" rel="noopener">▶ 2D Overview</a>` : '');

    const rows = topic.problems.map((p, i) => {
      const key = getKey(topic.id, i);
      const isChecked = checked[key] ? 'checked' : '';
      const isDone = checked[key] ? 'done' : '';
      return `
        <tr class="${isDone}" id="row-${topic.id}-${i}">
          <td><input type="checkbox" class="check" ${isChecked} onchange="toggle(${topic.id}, ${i}, this)"></td>
          <td><a class="problem-link" href="${p.url}" target="_blank" rel="noopener">${p.name}</a>${p.hard ? '<span class="hard-badge">HARD</span>' : ''}</td>
          <td><span class="pattern-tag">${p.pattern}</span></td>
          <td><a class="video-link" href="${p.video}" target="_blank" rel="noopener">▶ Watch</a></td>
        </tr>`;
    }).join('');

    div.innerHTML = `
      <div class="topic-header" onclick="toggleTopic(${topic.id})">
        <div class="topic-title">
          <span class="topic-num">${String(topic.id).padStart(2,'0')}</span>
          ${topic.title}
        </div>
        <div class="topic-meta">
          <span class="topic-progress-text" id="mini-txt-${topic.id}">0/${topic.problems.length}</span>
          <div class="topic-mini-bar"><div class="topic-mini-fill" id="mini-fill-${topic.id}"></div></div>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="topic-body">
        ${overviewLinks}
        <table class="problem-table">
          <thead><tr><th></th><th>Problem</th><th>Pattern</th><th>Video</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;

    container.appendChild(div);
    updateTopicBar(topic);
  });
  updateOverall();
}

function toggle(topicId, pi, el) {
  const key = getKey(topicId, pi);
  checked[key] = el.checked;
  save();
  const row = document.getElementById(`row-${topicId}-${pi}`);
  if (el.checked) row.classList.add('done'); else row.classList.remove('done');
  updateTopicBar(DATA.find(t => t.id === topicId));
  updateOverall();
}

function toggleTopic(id) {
  document.getElementById(`topic-${id}`).classList.toggle('open');
}

function resetAll() {
  if (!confirm('Reset all progress?')) return;
  checked = {};
  save();
  render();
}

render();
</script>
</body>
</html>
